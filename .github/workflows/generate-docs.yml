# .github/workflows/generate-docs.yml
# Se déclenche uniquement si un composant React est modifié
# Installe Ollama, génère les guides JSON, les committe

name: Générer les guides utilisateur

on:
  push:
    branches: [main]
    paths:
      - "src/components/**.jsx"
    # ↑ Filtre sur les composants uniquement — évite de tourner pour des
    #   changements de style, config, ou guides déjà générés

permissions:
  contents: write  # Nécessaire pour le git push du bot

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3h max — 30min × 3 étapes × marge
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Nécessaire pour git diff HEAD~1 HEAD

      # ── 2. Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── 3. Installer Ollama ────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | bash

      # ── 4. Démarrer Ollama + health check robuste ──────────────────────
      - name: Start Ollama and wait for readiness
        run: |
          ollama serve &
          echo "Attente du démarrage d'Ollama..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✔ Ollama prêt après ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "✗ Ollama n'a pas démarré dans les 60s"
              exit 1
            fi
            sleep 1
          done

      # ── 5. Télécharger le modèle ───────────────────────────────────────
      - name: Pull model
        # qwen2.5:7b (~4.7GB) — meilleur modèle qui tient dans les 7GB RAM des runners GitHub
        # Pull ~5-8min sur CI, génération ~1-3min par composant
        run: ollama pull qwen2.5:7b
        timeout-minutes: 15

      # ── 6. Vérifier que le modèle répond correctement ─────────────────
      - name: Smoke test Ollama
        run: |
          RESULT=$(curl -sf -X POST http://localhost:11434/api/generate \
            -H 'Content-Type: application/json' \
            -d '{"model":"qwen2.5:7b","prompt":"Réponds uniquement: ok","stream":false}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['response'])" 2>&1)
          echo "Réponse modèle : $RESULT"
          if [ -z "$RESULT" ]; then
            echo "✗ Le modèle ne répond pas"
            exit 1
          fi
          echo "✔ Modèle opérationnel"

      # ── 7. Détecter les composants modifiés ───────────────────────────
      - name: Detect changed components
        id: changes
        run: |
          # Essaie d'abord le diff avec le commit précédent
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep "src/components/.*\.jsx$" || true)

          # Premier push sans historique → traite tous les composants
          if [ -z "$CHANGED" ]; then
            echo "ℹ Pas de diff — scan complet des composants"
            CHANGED=$(find src/components -name "*.jsx" 2>/dev/null || true)
          fi

          # Sécurité : évite de traiter des centaines de fichiers d'un coup
          COUNT=$(echo "$CHANGED" | grep -c "\.jsx" || echo "0")
          if [ "$COUNT" -gt 20 ]; then
            echo "⚠ $COUNT composants détectés — limité aux 20 premiers"
            CHANGED=$(echo "$CHANGED" | head -20)
          fi

          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "count=$COUNT"   >> $GITHUB_OUTPUT
          echo "Composants à traiter : $CHANGED"

      # ── 8. Créer le dossier de sortie ─────────────────────────────────
      - name: Create docs directory
        run: mkdir -p public/docs

      # ── 9. Générer les guides ─────────────────────────────────────────
      - name: Generate guides
        if: steps.changes.outputs.files != ''
        env:
          OLLAMA_URL:   http://localhost:11434
          OLLAMA_MODEL: qwen2.5:7b
        run: |
          ERRORS=0
          for FILE in ${{ steps.changes.outputs.files }}; do
            if [ -f "$FILE" ]; then
              echo "──────────────────────────────────────────"
              echo "Traitement : $FILE"
              if node generate.js "$FILE"; then
                echo "✔ OK : $FILE"
              else
                echo "✗ Échec : $FILE (le fallback a été utilisé)"
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "⚠ Fichier absent (composant supprimé ?) : $FILE"
            fi
          done
          echo "──────────────────────────────────────────"
          echo "Génération terminée. Erreurs : $ERRORS"
          # On ne fail pas le job sur des erreurs partielles (fallback utilisé)
          # Le commit en step 10 inclura les guides fallback

      # ── 10. Valider les JSON générés ──────────────────────────────────
      - name: Validate generated JSON
        if: steps.changes.outputs.files != ''
        run: |
          INVALID=0
          for JSON_FILE in public/docs/*.json; do
            [ -f "$JSON_FILE" ] || continue
            if python3 -c "
          import json, sys
          with open('$JSON_FILE') as f:
              d = json.load(f)
          required = ['component', 'generated_at', 'sections']
          sections = ['description', 'etapes', 'erreurs']
          assert all(k in d for k in required), f'Clé manquante dans {d.keys()}'
          assert all(k in d['sections'] for k in sections), f'Section manquante'
          assert isinstance(d['sections']['etapes'], list), 'etapes doit être une liste'
          assert isinstance(d['sections']['erreurs'], list), 'erreurs doit être une liste'
          print(f'✔ {\"$JSON_FILE\"} : OK')
          " 2>&1; then
              : # OK
            else
              echo "✗ JSON invalide : $JSON_FILE"
              INVALID=$((INVALID + 1))
            fi
          done
          if [ "$INVALID" -gt 0 ]; then
            echo "✗ $INVALID fichier(s) JSON invalide(s)"
            exit 1
          fi
          echo "✔ Tous les fichiers JSON sont valides"

      # ── 11. Committer les guides générés ──────────────────────────────
      - name: Commit generated guides
        if: steps.changes.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/
          # "--quiet" supprime le message "nothing to commit" sans échouer
          if git diff --staged --quiet; then
            echo "ℹ Aucun guide modifié — pas de commit"
          else
            # [skip ci] empêche le workflow de se redéclencher sur ce commit
            git commit -m "docs: guides générés automatiquement par Ollama [skip ci]"
            git push
            echo "✔ Guides committés et pushés"
          fi