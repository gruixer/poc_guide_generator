# .github/workflows/generate-docs.yml
# Se déclenche à chaque push sur main si un composant React est modifié
# Installe Ollama, génère les guides JSON, les committe dans le repo

name: Générer les guides utilisateur

on:
  push:
    branches: [main]
    paths:
      - "src/components/**.jsx"  # Ne tourne que si un composant change

permissions:
  contents: write  # Nécessaire pour que le bot committe le JSON

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Nécessaire pour comparer avec le commit précédent

      # 2. Installe Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org/"

      # 3. Installe les dépendances npm (dotenv)
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ""

      # 4. Installe Ollama sur le serveur Ubuntu de GitHub
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | bash

      # 5. Démarre Ollama en arrière-plan
      - name: Start Ollama
        run: ollama serve &

      # 6. Attend qu'Ollama soit prêt à répondre
      - name: Wait for Ollama
        run: |
          echo "Attente démarrage Ollama..."
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null && echo "Ollama prêt !" && break
            sleep 2
          done

      # 7. Télécharge le modèle léger
      - name: Pull model
        run: ollama pull llama3.2:3b

      # 8. Détecte quels composants ont changé dans ce push
      - name: Detect changed components
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "src/components/.*\.jsx$" || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Composants modifiés : $CHANGED"

      # 9. Pour chaque composant modifié, génère son guide
      - name: Generate guides
        if: steps.changes.outputs.files != ''
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.2:3b
        run: |
          for FILE in ${{ steps.changes.outputs.files }}; do
            echo "Génération pour : $FILE"
            node generate.js "$FILE"
          done

      # 10. Committe le JSON généré dans le repo
      - name: Commit generated guides
        if: steps.changes.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/
          git diff --staged --quiet || git commit -m "docs: guides générés automatiquement par Ollama [skip ci]"
          git push